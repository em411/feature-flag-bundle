name: CI

on:
  pull_request: ~
  push: ~
  workflow_dispatch: ~

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['7.4', '8.0']
        symfony: ['4.4.*']

    name: PHP ${{ matrix.php }} Symfony ${{ matrix.symfony }}

    steps:
      - uses: actions/checkout@v6

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: :xdebug
          tools: php-cs-fixer

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: composer-${{ matrix.php }}-${{ matrix.symfony }}-${{ hashFiles('**/composer.json') }}
          restore-keys: |
            composer-${{ matrix.php }}-${{ matrix.symfony }}-

      - run: php ./tests/bin/pin-symfony-version.php "${{ matrix.symfony }}"

      - run: composer update --no-progress --prefer-stable

      - run: ./vendor/bin/phpunit

      - run: php-cs-fixer check --diff
